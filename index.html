<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Center Map</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f5;
}

.header {
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

#search {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 6px;
}

.cell {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  height: 180px;
}

.cell.important {
  background: #fff3a0;
}

.cell.done {
  opacity: 0.5;
}

.cell-number {
  border: none;
  text-align: center;
  font-size: 11px;
  border-bottom: 1px solid #eee;
}

textarea {
  flex: 1;
  border: none;
  resize: none;
  padding: 5px;
  font-size: 11px;
  border-top: 1px solid #eee;
}

textarea:disabled {
  background: #eee;
}

.buttons {
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #eee;
}

.buttons button {
  flex: 1;
  border: none;
  background: none;
  font-size: 14px;
  padding: 3px;
}

.active {
  background: #ddd;
}

.highlight {
  outline: 2px solid red;
}

.memo {
  margin: 10px;
}

.memo textarea {
  width: 100%;
  height: 100px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
  <div id="date"></div>
  <div>오늘도 화이팅 ❤️</div>
</div>

<input type="text" id="search" placeholder="🔍 검색">

<div class="grid" id="grid"></div>

<div class="memo">
  <textarea id="memo" placeholder="📝 메모"></textarea>
</div>

<script>
// 날짜
const today = new Date();
const days = ['일','월','화','수','목','금','토'];
document.getElementById('date').innerText =
`📅 ${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')} (${days[today.getDay()]})`;

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC_Jneo8Lf9nrMkOg0c36jhXLbMVK3QUNc",
  authDomain: "night-centrt-map.firebaseapp.com",
  databaseURL: "https://night-centrt-map-default-rtdb.firebaseio.com",
  projectId: "night-centrt-map",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById('grid');
let cells = [];

for (let i = 0; i < 24; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';

  const number = document.createElement('input');
  number.className = 'cell-number';
  number.placeholder = (i + 1);

  const top = document.createElement('textarea');
  const bottom = document.createElement('textarea');

  const btnBox = document.createElement('div');
  btnBox.className = 'buttons';

  const btnStar = document.createElement('button');
  btnStar.innerText = "⭐";

  const btnLock = document.createElement('button');
  btnLock.innerText = "🔒";

  const btnDone = document.createElement('button');
  btnDone.innerText = "✔";

  btnBox.append(btnStar, btnLock, btnDone);

  const ref = db.ref('cells/' + i);

  ref.on('value', (snap) => {
    const data = snap.val() || {};

    number.value = data.number || '';
    top.value = data.top || '';
    bottom.value = data.bottom || '';

    cell.classList.toggle('important', data.important);
    cell.classList.toggle('done', data.done);

    btnStar.classList.toggle('active', data.important);
    btnLock.classList.toggle('active', data.locked);
    btnDone.classList.toggle('active', data.done);

    const locked = data.locked;
    number.disabled = locked;
    top.disabled = locked;
    bottom.disabled = locked;
  });

  function save(extra = {}) {
    ref.update({
      number: number.value,
      top: top.value,
      bottom: bottom.value,
      ...extra
    });
  }

  number.addEventListener('input', () => save());
  top.addEventListener('input', () => save());
  bottom.addEventListener('input', () => save());

  // ⭐ 토글
  btnStar.onclick = () => {
    ref.child('important').get().then(snap => {
      ref.update({ important: !snap.val() });
    });
  };

  // 🔒 토글
  btnLock.onclick = () => {
    ref.child('locked').get().then(snap => {
      ref.update({ locked: !snap.val() });
    });
  };

  // ✔ 토글
  btnDone.onclick = () => {
    ref.child('done').get().then(snap => {
      ref.update({ done: !snap.val() });
    });
  };

  cell.append(number, top, bottom, btnBox);
  grid.appendChild(cell);

  cells.push({cell, number, top, bottom});
}

// 검색
document.getElementById('search').addEventListener('input', e => {
  const k = e.target.value.toLowerCase();

  cells.forEach(c => {
    const text = (c.number.value + c.top.value + c.bottom.value).toLowerCase();
    c.cell.classList.toggle('highlight', k && text.includes(k));
  });
});

// 메모
const memoRef = db.ref('memo');
const memo = document.getElementById('memo');

memoRef.on('value', snap => {
  memo.value = snap.val() || '';
});

memo.addEventListener('input', () => {
  memoRef.set(memo.value);
});
</script>

</body>
</html>
